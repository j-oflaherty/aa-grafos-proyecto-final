# ViG on STL-10 — inherits default.yaml (TensorBoard logger).
# STL-10: 10 classes, 96×96 RGB, 5 000 train / 8 000 test images.
# Images are resized to 224×224 to match the ViG patch pipeline.
# Training hyper-parameters match Table 3 of the ViG paper (ImageNet recipe).

trainer:
  max_epochs: 300
  logger:
    init_args:
      name: vig-stl10

model:
  class_path: vision_gnn.models.vig.VigLightningModule
  init_args:
    num_classes: 10
    n_filters: 192
    n_blocks: 8
    lr: 2.0e-3
    weight_decay: 0.05
    drop_path_rate: 0.1
    warmup_epochs: 20
    max_epochs: 300
    ema_decay: 0.9993
    label_smoothing: 0.1

data:
  class_path: vision_gnn.data.stl10.STL10DataModule
  init_args:
    data_dir: data/stl10
    batch_size: 64
    num_workers: 4
    val_split: 0.1
    augmentation:
      class_path: vision_gnn.data.augmentation.AugmentationConfig
      init_args:
        rand_augment: true
        repeated_augment: 3
        mixup_alpha: 0.8
        cutmix_alpha: 1.0
        random_erasing_prob: 0.25
