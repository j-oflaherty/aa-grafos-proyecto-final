# PyramidViG-Ti on STL-10 — paper architecture (~10.7 M parameters).
# From Table 1: blocks=[2,2,6,2], channels=[48,96,240,384], E=4, K=9.
# STL-10: 10 classes, 96×96 RGB resized to 224×224; 5 000 labeled train / 8 000 test.
# Training hyper-parameters match Table 3 of the ViG paper (ImageNet recipe).
# Inherits trainer defaults from default.yaml (TensorBoard, checkpoint, early-stop).
#
# Usage:
#   vig-train fit --config configs/default.yaml --config configs/pvig/stl10_ti.yaml

trainer:
  max_epochs: 300
  logger:
    init_args:
      name: pvig-ti-stl10

model:
  class_path: vision_gnn.models.pvig.PVigLightningModule
  init_args:
    num_classes: 10
    blocks: [2, 2, 6, 2]
    channels: [48, 96, 240, 384]
    k: 9
    conv: mr
    act: gelu
    drop_path_rate: 0.1
    dropout: 0.1
    in_channels: 3
    lr: 2.0e-3
    weight_decay: 0.05
    warmup_epochs: 20
    max_epochs: 300
    ema_decay: 0.99996
    label_smoothing: 0.1

data:
  class_path: vision_gnn.data.stl10.STL10DataModule
  init_args:
    data_dir: data/stl10
    batch_size: 32
    num_workers: 4
    val_split: 0.1
    augmentation:
      class_path: vision_gnn.data.augmentation.AugmentationConfig
      init_args:
        rand_augment: true
        repeated_augment: 3
        mixup_alpha: 0.8
        cutmix_alpha: 1.0
        random_erasing_prob: 0.25
